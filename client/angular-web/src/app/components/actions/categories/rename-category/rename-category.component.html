<form [formGroup]="renameForm" (submit)="submitRename()">
  <app-category-select (onChange)="setOldName($event)"></app-category-select>
  <label for="newName">שם חדש לקטגוריה</label>
  <input formControlName="newName" id="newName" type="text" />
  <button type="submit" [disabled]="!renameForm.valid">שנה שם</button>
</form>
